
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Server (Admin)</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: white; text-align: center; padding: 50px; }
        .box { background: #222; padding: 20px; border-radius: 10px; max-width: 400px; margin: 0 auto; border: 2px solid #444; }
        h1 { color: #00ff88; }
        .data { font-size: 24px; font-weight: bold; margin: 20px 0; color: #ffeb3b; }
        button { background: #e91e63; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:active { background: #c2185b; }
        .status { margin-top: 15px; font-size: 14px; color: #aaa; }
        #error-log { color: #ff3b3b; margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>✈️ Auto Game Server</h1>
        <p>Keep this page open to run the game.</p>
        <div class="data" id="display">Status: STOPPED</div>
        <button id="startBtn">START SERVER</button>
        <div class="status" id="log">Waiting to start...</div>
        <div id="error-log"></div>
    </div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const startBtn = document.getElementById('startBtn');
        const display = document.getElementById('display');
        const log = document.getElementById('log');
        const errorLog = document.getElementById('error-log');

        let isRunning = false;
        let supabase, channel;

        function showError(msg) {
            errorLog.innerText = "Error: " + msg;
            alert("System Message: " + msg);
        }

        // Initialize only when button is clicked (to prevent mobile browser blocking)
        startBtn.addEventListener('click', () => {
            try {
                if (!window.supabase) {
                    showError("Supabase is blocked by your browser. Please reload the page.");
                    return;
                }

                if (!supabase) {
                    const SUPABASE_URL = 'https://uijafeedhawjlnppmhmc.supabase.co';
                    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpamFmZWVkaGF3amxucHBtaG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTQzMzQsImV4cCI6MjA5MjMzMDMzNH0.phOvqK1nUkQARhVjp1T-GOEf3wnTYN7rZCPhIxPIzBQ';
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    channel = supabase.channel('game-room');
                }

                if (!isRunning) {
                    isRunning = true;
                    startBtn.innerText = "CONNECTING...";
                    startBtn.style.background = "#555";
                    
                    channel.subscribe((status) => {
                        log.innerText = "Connection: " + status;
                        if (status === 'SUBSCRIBED') {
                            startBtn.innerText = "STOP SERVER";
                            log.innerText = "Server is running online...";
                            runGameEngine();
                        } else if (status === 'CHANNEL_ERROR') {
                            showError("Failed to connect to Supabase. Check internet.");
                            isRunning = false;
                            startBtn.innerText = "START SERVER";
                            startBtn.style.background = "#e91e63";
                        }
                    });
                } else {
                    isRunning = false;
                    startBtn.innerText = "START SERVER";
                    startBtn.style.background = "#e91e63";
                    display.innerText = "Status: STOPPED";
                    log.innerText = "Server stopped.";
                    channel.unsubscribe();
                    location.reload();
                }
            } catch (err) {
                showError(err.message);
            }
        });

        // The Game Math
        function generateCrashPoint() {
            const r = Math.random();
            let val = 0.99 / r;
            if (val < 1.00) val = 1.00;
            if (val > 100) val = 100; 
            return val;
        }

        function sendUpdate(payload) {
            if(channel) {
                channel.send({
                    type: 'broadcast',
                    event: 'game_update',
                    payload: payload
                }).catch(err => console.log("Broadcast error:", err));
            }
        }

        async function runGameEngine() {
            let timeLeft = 10.0;
            display.innerText = "WAITING FOR PLAYERS...";
            display.style.color = "#00ff88";

            let waitInterval = setInterval(() => {
                if(!isRunning) { clearInterval(waitInterval); return; }
                timeLeft -= 0.1;
                sendUpdate({ state: 'WAITING', timeLeft: timeLeft });
                if (timeLeft <= 0) {
                    clearInterval(waitInterval);
                    startFlying();
                }
            }, 100);
        }

        function startFlying() {
            let crashPoint = generateCrashPoint();
            let currentMultiplier = 1.00;
            let elapsed = 0;
            
            log.innerText = `Secret Crash Point: ${crashPoint.toFixed(2)}x`;
            display.style.color = "#ffffff";

            let flyInterval = setInterval(() => {
                if(!isRunning) { clearInterval(flyInterval); return; }
                elapsed += 100;
                currentMultiplier = Math.exp(0.00008 * elapsed);
                
                if (currentMultiplier >= crashPoint) {
                    clearInterval(flyInterval);
                    startCrashed(crashPoint);
                } else {
                    display.innerText = `FLYING: ${currentMultiplier.toFixed(2)}x`;
                    sendUpdate({ state: 'FLYING', multiplier: currentMultiplier });
                }
            }, 100);
        }

        function startCrashed(crashPoint) {
            display.innerText = `CRASHED @ ${crashPoint.toFixed(2)}x`;
            display.style.color = "#ff3b3b";
            sendUpdate({ state: 'CRASHED', crashPoint: crashPoint });

            setTimeout(() => {
                if(isRunning) runGameEngine(); 
            }, 4000);
        }
    </script>
</body>
</html>
